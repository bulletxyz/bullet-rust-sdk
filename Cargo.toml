[workspace]
members = ["rust", "wasm"]
resolver = "2"

[workspace.dependencies]
bon = "3.9.0"
bullet-exchange-interface = { git = "https://github.com/bulletxyz/bullet-exchange-interface.git", rev = "74c9940fbfe0a44a276ff7d1d2e4418548cf1f73" }
# Optimize WASM binary size without affecting the rust crate
[profile.release]
lto = true

[profile.release.package.bullet-rust-sdk-wasm]
opt-level = "z"
codegen-units = 1

