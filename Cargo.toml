[workspace]
members = ["rust", "wasm"]
resolver = "2"

[workspace.dependencies]
bon = "3.9.0"
bullet-exchange-interface = { git = "https://github.com/bulletxyz/bullet-exchange-interface.git", rev = "7636c2d00c665002e7af858051568d33863389b6" }
# Optimize WASM binary size without affecting the rust crate
[profile.release]
lto = true

[profile.release.package.bullet-rust-sdk-wasm]
opt-level = "z"
codegen-units = 1

