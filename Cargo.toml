[workspace]
members = ["rust", "wasm"]
resolver = "2"

[workspace.dependencies]
bon = "3.9.0"
bullet-exchange-interface = { git = "https://github.com/bulletxyz/bullet-exchange-interface.git", rev = "8074f2657a61ae582fd0c66313076b7110bf6e55", features = ["schema"] }
# Optimize WASM binary size without affecting the rust crate
[profile.release]
lto = true

[profile.release.package.bullet-rust-sdk-wasm]
opt-level = "z"
codegen-units = 1
