# Generated from the monorepo package manifests.
[workspace]
members = ["rust", "wasm"]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT"
repository = "https://github.com/bulletxyz/bullet-rust-sdk"

[workspace.dependencies]
bullet-exchange-interface = { version = "0.14" }
bullet-rust-sdk = { path = "rust", version = "0.0.33", default-features = false }

[profile.release]
lto = true

[profile.release.package.bullet-rust-sdk-wasm]
opt-level = "z"
codegen-units = 1
