name: "Build"
description: "Sets up environment and builds the WASM package"

inputs:
  node-version:
    description: "Node.js version to install"
    required: false
    default: "24"
  setup-npm-registry:
    description: "Setup NPM registry URL"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.setup-npm-registry == 'true' && 'https://registry.npmjs.org' || '' }}

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      with:
        targets: wasm32-unknown-unknown

    - name: Rust cache
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

    - name: Install wasm-pack
      # Don't use `cargo binstall` here — rust-cache (above) restores
      # `.crates2.json` metadata so binstall no-ops without placing the
      # binary on PATH.
      uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
      with:
        tool: wasm-pack

    - name: Install just
      uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

    - name: Install npm dependencies
      shell: bash
      working-directory: ./wasm
      run: npm install

    - name: Build WASM
      shell: bash
      run: just build-wasm
