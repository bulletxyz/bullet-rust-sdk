name: "Build"
description: "Sets up environment and builds the WASM package"

inputs:
  node-version:
    description: "Node.js version to install"
    required: false
    default: "24"
  setup-npm-registry:
    description: "Setup NPM registry URL"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.setup-npm-registry == 'true' && 'https://registry.npmjs.org' || '' }}

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Rust cache
      uses: Swatinem/rust-cache@v2

    - name: Install wasm-pack
      # `taiki-e/install-action` handles its own binary cache and verifies the
      # tool is on PATH after install. The previous `cargo binstall` approach
      # combined with `Swatinem/rust-cache@v2` (above) was broken: rust-cache
      # restores `~/.cargo/.crates2.json` metadata showing wasm-pack as
      # installed, so `cargo binstall wasm-pack -y` no-ops with
      # "wasm-pack vX.Y.Z is already installed, use --force to override" —
      # even when the binary isn't actually present on PATH. The subsequent
      # `wasm-pack build` then dies with `command not found`. See the
      # release-2026-05-13 npm-publish failure for the symptom.
      uses: taiki-e/install-action@v2
      with:
        tool: wasm-pack

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Install npm dependencies
      shell: bash
      working-directory: ./wasm
      run: npm install

    - name: Build WASM
      shell: bash
      run: just build-wasm
