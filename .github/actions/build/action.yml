name: "Build"
description: "Sets up environment and builds the WASM package"

inputs:
  node-version:
    description: "Node.js version to install"
    required: false
    default: "24"
  setup-npm-registry:
    description: "Setup NPM registry URL"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.setup-npm-registry == 'true' && 'https://registry.npmjs.org' || '' }}

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        targets: wasm32-unknown-unknown

    - name: Rust cache
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

    - name: Install cargo-binstall
      uses: cargo-bins/cargo-binstall@aaa84a43aec4955a42c5ffc65d258961e39f276e # v1.19.1

    - name: Install wasm-pack
      shell: bash
      run: cargo binstall wasm-pack -y

    - name: Install just
      uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

    - name: Install npm dependencies
      shell: bash
      working-directory: ./wasm
      run: npm install

    - name: Build WASM
      shell: bash
      run: just build-wasm
