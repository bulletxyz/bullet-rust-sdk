name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: examples/package-lock.json
      - name: Enable corepack
        run: corepack enable
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,just,wasm-pack
      - uses: Swatinem/rust-cache@v2
      - run: just ci
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Scope to bullet-rust-sdk only — bullet-rust-sdk-wasm has its own
      # build pipeline (npm publish workflow) and is not crates.io-bound.
      - run: cargo +nightly fmt --package bullet-rust-sdk -- --check --config-path rustfmt.nightly.toml
      - run: cargo clippy --package bullet-rust-sdk --all-targets --all-features -- -D warnings
      - run: cargo test --package bullet-rust-sdk --all-features
