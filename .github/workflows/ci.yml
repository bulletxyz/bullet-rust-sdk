name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_INCREMENTAL: "0"

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install Rust toolchain
        run: rustup show
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-nextest,just
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: just fmt-check
      - run: just check-spec
      - run: just lint
      - run: just test
      - run: just test-doc

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install Rust toolchain
        run: rustup show
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: examples/package-lock.json
      - name: Enable corepack
        run: corepack enable
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: just,wasm-pack
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: wasm
      - run: just build-wasm
      - run: just test-wasm
      - name: Install example dependencies
        run: cd examples && npm ci --install-links
      - run: cd examples/node && npm test
      - run: cd examples/deno && deno task test
      - run: cd examples/web && npx next build
