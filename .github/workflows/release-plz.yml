name: Release-plz

on:
  push:
    branches: [main]

env:
  # Use the system git CLI for fetching git deps; libgit2 can fail on private/auth flows.
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

permissions:
  pull-requests: write
  contents: write
  id-token: write # required for crates.io OIDC trusted publishing

jobs:
  release-plz:
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Authenticate with crates.io
        id: cargo-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ steps.cargo-auth.outputs.token }}

      # release-plz bumps the Rust crate version, but the WASM crate ships to npm
      # and can be skipped by release-plz's release/tag logic. Mirror the Rust
      # crate version onto both WASM manifests so the Rust crate and
      # @bulletxyz/sdk-wasm stay in lockstep. The actual `npm publish` is handled
      # by npm-publish.yml, which is triggered by the v<version> tag release-plz
      # creates after merge.
      - name: Sync WASM manifests to release PR
        if: ${{ steps.release-plz.outputs.pr != '' }}
        env:
          PR_JSON: ${{ steps.release-plz.outputs.pr }}
        run: |
          set -euo pipefail

          BRANCH=$(echo "$PR_JSON" | jq -r '.head_branch')
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
            echo "No head_branch in release PR output; skipping package.json sync"
            exit 0
          fi

          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

          # cargo pkgid outputs "path+file:///…/rust#bullet-rust-sdk@0.0.14" on
          # modern Cargo, or "…#0.0.14" on older versions. Take whatever follows
          # the final '#' or '@'.
          V=$(cargo pkgid -p bullet-rust-sdk | sed -E 's/^.*[#@]([^#@]+)$/\1/')
          export V
          echo "Syncing WASM manifests to version $V"

          perl -0pi -e 's/(\[package\]\s+name = "bullet-rust-sdk-wasm"\s+version = ")[^"]+/\1$ENV{V}/' wasm/Cargo.toml
          perl -0pi -e 's/(\[\[package\]\]\s+name = "bullet-rust-sdk-wasm"\s+version = ")[^"]+/\1$ENV{V}/' Cargo.lock
          (cd wasm && npm version "$V" --no-git-tag-version --allow-same-version)

          if git diff --quiet -- wasm/Cargo.toml Cargo.lock wasm/package.json; then
            echo "WASM manifests already at $V; nothing to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add wasm/Cargo.toml Cargo.lock wasm/package.json
          git commit -m "chore: sync WASM manifests to $V"
          git push origin "$BRANCH"
